title: Credential Discovery via Sudo Cat
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: experimental
description: >
    Detects use of sudo to read sensitive credential files
    such as /etc/passwd or /etc/shadow. Common attacker
    behavior during post-exploitation discovery phase.
author: Hari
date: 2026/05/23
references:
    - https://attack.mitre.org/techniques/T1087/
    - https://attack.mitre.org/techniques/T1003/
tags:
    - attack.discovery
    - attack.t1087
    - attack.credential_access
    - attack.t1003
logsource:
    product: linux
    service: sudo
detection:
    selection:
        program: sudo
        data.dstuser: root
        data.command|contains:
            - '/etc/passwd'
            - '/etc/shadow'
    condition: selection
falsepositives:
    - System administrators performing legitimate security audits
level: high
