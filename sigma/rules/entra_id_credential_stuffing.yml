title: Entra ID Credential Stuffing Success with MFA Bypass
id: a7b8c9d0-e1f2-3456-abcd-789012345678
status: experimental
description: >
    Detects successful login with high risk score and MFA bypassed.
    Indicates credential stuffing attack succeeded and attacker
    bypassed MFA — critical severity requiring immediate response.
author: Hari
date: 2026/05/24
references:
    - https://attack.mitre.org/techniques/T1110/
    - https://attack.mitre.org/techniques/T1078/
tags:
    - attack.credential_access
    - attack.t1110
    - attack.t1078
    - attack.initial_access
logsource:
    product: azure
    service: signinlogs
detection:
    selection:
        resultDescription: 'Success'
        riskLevelDuringSignIn: 'high'
        mfaDetail.authDetail|contains: 'MFA bypassed'
    condition: selection
falsepositives:
    - Legitimate admin bypassing MFA for break-glass account
level: critical
